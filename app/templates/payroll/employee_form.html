{% extends "base.html" %}
{% block page_title %}موظف جديد{% endblock %}
{% block content %}
<div class="card p-6 max-w-3xl">
  <form method="POST" class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">الاسم</label>
        <input type="text" name="name" required class="input">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">الوظيفة</label>
        <input type="text" name="job_title" class="input">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">البريد الإلكتروني</label>
        <input type="email" name="email" dir="ltr" class="input">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">الهاتف</label>
        <input type="text" name="phone" dir="ltr" class="input">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">تاريخ بدء العمل</label>
        <input type="date" name="start_date" id="start_date" class="input">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">نوع العقد</label>
        <select name="contract_type" class="select">
          <option value="FULL_TIME">دوام كامل</option>
          <option value="PART_TIME">دوام جزئي</option>
          <option value="TEMPORARY">مؤقت</option>
        </select>
      </div>
    </div>
    <hr class="border-slate-100">
    <p class="text-sm font-semibold text-slate-600">الراتب الأساسي والثوابت</p>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">الراتب الأساسي</label>
        <input type="number" name="basic_salary" step="0.01" value="0" required class="input font-mono">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">البدلات الثابتة</label>
        <input type="number" name="allowances" step="0.01" value="0" class="input font-mono">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">الخصومات الثابتة</label>
        <input type="number" name="deductions" step="0.01" value="0" class="input font-mono">
      </div>
    </div>
    <p class="text-xs text-slate-500">المتغيرات (أوفرتايم، غياب، سلف) بتدخلها وقت تشغيل كشف الرواتب لكل شهر</p>
    <div class="flex justify-end gap-2 pt-2">
      <a href="{{ url_for('payroll.index') }}" class="btn-secondary">إلغاء</a>
      <button type="submit" class="btn-primary">إضافة</button>
    </div>
  </form>
</div>
<script>document.getElementById('start_date').value = new Date().toISOString().split('T')[0];</script>
{% endblock %}
