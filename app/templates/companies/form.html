{% extends "base.html" %}
{% block page_title %}{% if company %}تعديل الشركة{% else %}شركة جديدة{% endif %}{% endblock %}
{% block content %}
<div class="card p-6 max-w-2xl">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">اسم الشركة</label>
      <input type="text" name="name" required value="{{ company.name if company else '' }}" class="input">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">العملة الأساسية</label>
        <select name="base_currency" class="select" {% if company %}disabled{% endif %}>
          <option value="SAR" {% if company and company.base_currency == 'SAR' %}selected{% endif %}>SAR — ريال سعودي</option>
          <option value="EGP" {% if company and company.base_currency == 'EGP' %}selected{% endif %}>EGP — جنيه مصري</option>
          <option value="AED" {% if company and company.base_currency == 'AED' %}selected{% endif %}>AED — درهم إماراتي</option>
          <option value="USD" {% if company and company.base_currency == 'USD' %}selected{% endif %}>USD — دولار</option>
          <option value="EUR" {% if company and company.base_currency == 'EUR' %}selected{% endif %}>EUR — يورو</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">نسبة الضريبة %</label>
        <input type="number" name="vat_rate" step="0.01" value="{{ company.vat_rate if company else 15 }}" class="input">
      </div>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">الرقم الضريبي</label>
      <input type="text" name="tax_number" value="{{ company.tax_number if company else '' }}" class="input">
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">العنوان</label>
      <textarea name="address" rows="2" class="textarea">{{ company.address if company else '' }}</textarea>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="{{ url_for('companies.index') }}" class="btn-secondary">إلغاء</a>
      <button type="submit" class="btn-primary">{% if company %}حفظ التغييرات{% else %}إنشاء وتهيئة شجرة الحسابات{% endif %}</button>
    </div>
  </form>
</div>
{% endblock %}
