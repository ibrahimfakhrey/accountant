{% extends "base.html" %}
{% block page_title %}الشركات{% endblock %}
{% block content %}
<div class="card p-6">
  <div class="flex items-center justify-between mb-5">
    <h2 class="font-bold text-navy-900">جميع شركاتي</h2>
    <a href="{{ url_for('companies.new') }}" class="btn-primary">+ شركة جديدة</a>
  </div>
  <div class="grid grid-cols-2 gap-4">
    {% for c in companies %}
    <div class="border border-slate-200 rounded-xl p-5 hover:border-brand-500 transition">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="font-bold text-navy-900">{{ c.name }}</h3>
          <div class="text-xs text-slate-500 mt-1">عملة أساسية: {{ c.base_currency }}</div>
          {% if c.tax_number %}<div class="text-xs text-slate-500">ضريبي: {{ c.tax_number }}</div>{% endif %}
        </div>
        <a href="{{ url_for('companies.edit', company_id=c.id) }}" class="btn-secondary text-sm">تعديل</a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
