{% extends "base.html" %}
{% block page_title %}مورد جديد{% endblock %}
{% block content %}
<div class="card p-6 max-w-2xl">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">الاسم</label>
      <input type="text" name="name" required class="input">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">البريد الإلكتروني</label>
        <input type="email" name="email" dir="ltr" class="input">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">الهاتف</label>
        <input type="text" name="phone" dir="ltr" class="input">
      </div>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">الحساب البنكي</label>
      <input type="text" name="bank_account" dir="ltr" class="input">
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">العنوان</label>
      <textarea name="address" rows="2" class="textarea"></textarea>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">الرقم الضريبي</label>
      <input type="text" name="tax_number" class="input">
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="{{ url_for('vendors.index') }}" class="btn-secondary">إلغاء</a>
      <button type="submit" class="btn-primary">إضافة</button>
    </div>
  </form>
</div>
{% endblock %}
