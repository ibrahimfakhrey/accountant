{% extends "base.html" %}
{% block page_title %}قيد محاسبي جديد{% endblock %}
{% block content %}
<form method="POST" class="space-y-4" id="journal-form">
  <div class="card p-6">
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">التاريخ</label>
        <input type="date" name="date" value="{{ today_str if today_str else '' }}" required class="input" id="entry-date">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">المرجع</label>
        <input type="text" name="reference" class="input">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">العملة</label>
        <select name="currency" class="select">
          <option value="SAR">SAR</option><option value="EGP">EGP</option>
          <option value="USD">USD</option><option value="EUR">EUR</option>
          <option value="AED">AED</option>
        </select>
      </div>
    </div>
    <div class="mt-4">
      <label class="block text-sm font-semibold text-slate-700 mb-2">الوصف</label>
      <input type="text" name="description" required class="input">
    </div>
  </div>

  <div class="card p-6">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-bold text-navy-900">سطور القيد</h3>
      <button type="button" onclick="addLine()" class="btn-secondary text-sm">+ سطر</button>
    </div>
    <table class="data-table" id="lines-table">
      <thead>
        <tr><th>الحساب</th><th>المذكرة</th><th class="text-left">مدين</th><th class="text-left">دائن</th><th></th></tr>
      </thead>
      <tbody id="lines-body"></tbody>
      <tfoot>
        <tr class="font-bold border-t-2 border-navy-900">
          <td colspan="2" class="text-left py-3">الإجمالي</td>
          <td class="text-left font-mono" id="total-debit">0.00</td>
          <td class="text-left font-mono" id="total-credit">0.00</td>
          <td></td>
        </tr>
        <tr id="balance-row" class="hidden">
          <td colspan="5" class="text-center py-2 text-red-600 text-sm font-medium" id="balance-msg"></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="flex justify-end gap-2">
    <a href="{{ url_for('journals.index') }}" class="btn-secondary">إلغاء</a>
    <button type="submit" class="btn-primary" id="submit-btn">حفظ القيد</button>
  </div>
</form>

<script>
const accountsData = [{% for a in accounts %}{id:{{a.id}},code:"{{a.code}}",name:"{{(a.name_ar or a.name)|e}}"}{% if not loop.last %},{% endif %}{% endfor %}];
let lineIdx = 0;
function addLine() {
  const tbody = document.getElementById('lines-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><select name="account_id[]" class="select text-sm" onchange="updateTotals()">
      <option value="">— اختر —</option>
      ${accountsData.map(a => `<option value="${a.id}">${a.code} — ${a.name}</option>`).join('')}
    </select></td>
    <td><input type="text" name="memo[]" class="input text-sm"></td>
    <td><input type="number" name="debit[]" step="0.01" min="0" value="0" class="input text-sm font-mono text-left" oninput="updateTotals()"></td>
    <td><input type="number" name="credit[]" step="0.01" min="0" value="0" class="input text-sm font-mono text-left" oninput="updateTotals()"></td>
    <td><button type="button" onclick="this.closest('tr').remove(); updateTotals();" class="text-red-500 text-sm">×</button></td>
  `;
  tbody.appendChild(tr);
  lineIdx++;
}
function updateTotals() {
  let td = 0, tc = 0;
  document.querySelectorAll('input[name="debit[]"]').forEach(i => td += parseFloat(i.value || 0));
  document.querySelectorAll('input[name="credit[]"]').forEach(i => tc += parseFloat(i.value || 0));
  document.getElementById('total-debit').textContent = td.toFixed(2);
  document.getElementById('total-credit').textContent = tc.toFixed(2);
  const row = document.getElementById('balance-row');
  const msg = document.getElementById('balance-msg');
  const btn = document.getElementById('submit-btn');
  if (Math.abs(td - tc) < 0.001 && td > 0) {
    row.classList.add('hidden');
    btn.disabled = false;
    btn.classList.remove('opacity-50');
  } else if (td > 0 || tc > 0) {
    row.classList.remove('hidden');
    msg.textContent = `القيد غير متوازن: الفرق ${(td - tc).toFixed(2)}`;
    btn.disabled = true;
    btn.classList.add('opacity-50');
  }
}
addLine(); addLine();
document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
