<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب — LedgerOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Cairo', sans-serif; background: linear-gradient(180deg, #FFFFFF 0%, #F0F7FF 100%); min-height: 100vh; }
  .gradient-heading { background: linear-gradient(135deg, #0A2540 0%, #2563EB 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
</style>
</head>
<body class="antialiased">
<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-lg">
    <div class="text-center mb-6">
      <div class="inline-flex items-center gap-2 mb-4">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-[#0A2540] to-[#2563EB] flex items-center justify-center text-white font-bold text-xl">L</div>
        <div class="text-right">
          <div class="text-2xl font-bold gradient-heading">LedgerOS</div>
          <div class="text-xs text-slate-500">نظام المحاسبة الذكي</div>
        </div>
      </div>
      <h1 class="text-3xl font-bold gradient-heading mb-2">ابدأ مجاناً</h1>
      <p class="text-slate-500">أنشئ حسابك وشركتك الأولى في خطوة واحدة</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium {% if category == 'error' %}bg-red-50 text-red-700 border border-red-100{% else %}bg-emerald-50 text-emerald-700 border border-emerald-100{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">الاسم الكامل</label>
            <input type="text" name="full_name" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-[#2563EB] focus:ring-4 focus:ring-blue-100">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">البريد الإلكتروني</label>
            <input type="email" name="email" required dir="ltr" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-[#2563EB] focus:ring-4 focus:ring-blue-100">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">كلمة المرور</label>
          <input type="password" name="password" required minlength="6" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-[#2563EB] focus:ring-4 focus:ring-blue-100">
        </div>
        <hr class="my-2 border-slate-100">
        <p class="text-sm font-semibold text-slate-600">بيانات شركتك الأولى</p>
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-sm font-semibold text-slate-700 mb-2">اسم الشركة</label>
            <input type="text" name="company_name" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-[#2563EB] focus:ring-4 focus:ring-blue-100">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">العملة الأساسية</label>
            <select name="base_currency" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-[#2563EB] focus:ring-4 focus:ring-blue-100 bg-white">
              <option value="SAR">ريال سعودي (SAR)</option>
              <option value="EGP">جنيه مصري (EGP)</option>
              <option value="AED">درهم إماراتي (AED)</option>
              <option value="USD">دولار أمريكي (USD)</option>
              <option value="EUR">يورو (EUR)</option>
            </select>
          </div>
        </div>
        <button type="submit" class="w-full bg-gradient-to-br from-[#0A2540] to-[#1B3A5C] text-white py-3 rounded-xl font-bold hover:shadow-xl hover:-translate-y-0.5 transition-all mt-2">
          ابدأ الآن
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-500">
        لديك حساب بالفعل؟
        <a href="{{ url_for('auth.login') }}" class="text-[#2563EB] font-semibold hover:underline">تسجيل الدخول</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
