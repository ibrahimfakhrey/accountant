<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول — مرصود</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Cairo', sans-serif; background: linear-gradient(180deg, #FFFFFF 0%, #F0F7FF 100%); min-height: 100vh; }
  .gradient-heading {
    background: linear-gradient(135deg, #0A2540 0%, #2563EB 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
</style>
</head>
<body class="antialiased">
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-6">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-[#0A2540] to-[#2563EB] flex items-center justify-center text-white font-bold text-xl">م</div>
        <div class="text-right">
          <div class="text-2xl font-bold gradient-heading">مرصود</div>
          <div class="text-xs text-slate-500">نظام المحاسبة الذكي</div>
        </div>
      </div>
      <h1 class="text-3xl font-bold gradient-heading mb-2">مرحباً بعودتك</h1>
      <p class="text-slate-500">سجّل دخولك للاستمرار</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium {% if category == 'error' %}bg-red-50 text-red-700 border border-red-100{% else %}bg-emerald-50 text-emerald-700 border border-emerald-100{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">البريد الإلكتروني</label>
          <input type="email" name="email" required dir="ltr" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-[#2563EB] focus:ring-4 focus:ring-blue-100 transition">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">كلمة المرور</label>
          <input type="password" name="password" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-[#2563EB] focus:ring-4 focus:ring-blue-100 transition">
        </div>
        <button type="submit" class="w-full bg-gradient-to-br from-[#0A2540] to-[#1B3A5C] text-white py-3 rounded-xl font-bold hover:shadow-xl hover:-translate-y-0.5 transition-all">
          تسجيل الدخول
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-500">
        ليس لديك حساب؟
        <a href="{{ url_for('auth.register') }}" class="text-[#2563EB] font-semibold hover:underline">إنشاء حساب جديد</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
