<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>{% block title %}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#F0F7FF;font-family:'Cairo','Segoe UI',Tahoma,sans-serif;color:#0F172A">
  <div style="max-width:600px;margin:0 auto;padding:24px">
    <div style="background:#0A2540;color:#fff;padding:24px;border-radius:16px 16px 0 0">
      <div style="display:inline-block;width:40px;height:40px;background:#2563EB;border-radius:10px;text-align:center;line-height:40px;font-weight:bold;font-size:20px">م</div>
      <span style="font-size:18px;font-weight:bold;margin-right:12px;vertical-align:middle">{{ invoice.company.name if invoice else (employee.company.name if employee else 'مرصود') }}</span>
    </div>
    <div style="background:#fff;padding:32px;border-radius:0 0 16px 16px;border:1px solid #E2E8F0;border-top:0">
      {% block content %}{% endblock %}
    </div>
    <div style="text-align:center;color:#94A3B8;font-size:12px;margin-top:16px">
      هذا إيميل تلقائي من نظام مرصود (Marsoud)
    </div>
  </div>
</body>
</html>
